<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Premium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", sans-serif;
            background: #0a0a0a;
            color: #d4af37;
            padding: 15px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.8em; text-shadow: 0 0 10px rgba(212,175,55,0.4); }
        .admin-pin {
            background: #00cc00;
            color: #0a0a0a;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .info-box {
            background: rgba(0,212,255,0.08);
            border: 1px solid #00d4ff;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            color: #00d4ff;
            font-size: 0.9em;
        }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(212,175,55,0.1);
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
        }
        .tab-btn.active { background: #d4af37; color: #0a0a0a; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .status-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .status-card {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #d4af37;
            text-align: center;
        }
        .status-card h3 { color: #b8860b; font-size: 0.8em; margin-bottom: 5px; }
        .status-card .number { font-size: 2em; font-weight: bold; }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 12px;
        }
        .service-card {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #d4af37;
        }
        .service-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 0.95em;
            font-weight: bold;
        }
        .service-emoji { font-size: 1.2em; }
        .service-name { flex: 1; color: #d4af37; }
        .service-count {
            background: #d4af37;
            color: #0a0a0a;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.8em;
        }
        .accounts-input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 8px;
            border-radius: 4px;
            font-family: monospace;
            min-height: 80px;
            resize: vertical;
            margin-bottom: 8px;
        }
        .btn {
            background: #d4af37;
            color: #0a0a0a;
            border: none;
            padding: 8px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
        }
        .btn-delete { background: #ff6b6b; color: #fff; }
        .btn-renew { background: #4caf50; color: #fff; }
        .btn-expire { background: #ffb300; color: #000; }
        .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }

        .add-service-section {
            background: rgba(212,175,55,0.05);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #d4af37;
            margin-bottom: 20px;
        }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; color: #d4af37; margin-bottom: 4px; font-size: 0.9em; }
        .form-group input {
            width: 100%;
            padding: 8px;
            background: #0a0a0a;
            border: 1px solid #d4af37;
            color: #d4af37;
            border-radius: 4px;
        }

        .purchases-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
        }
        .purchase-card {
            background: #1a3a1a;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #4caf50;
        }
        .video-admin-card {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #d4af37;
            margin-bottom: 8px;
        }
        @media (max-width: 600px) {
            .status-bar { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="header">
    <h1>Painel Administrativo</h1>
    <p>Gerencie serviços, contas e compras</p>
</div>
<div class="admin-pin">PIN ATIVO: <strong>633733</strong></div>
<div id="pendingAlert" class="info-box" style="display:none;"></div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('contas')">Contas</button>
    <button class="tab-btn" onclick="switchTab('compras')">Compras</button>
    <button class="tab-btn" onclick="switchTab('videos')">Vídeos +18</button>
	<button class="tab-btn" onclick="switchTab('seguranca')">Segurança</button>
</div>

<div id="contas" class="tab-content active">
    <div class="add-service-section">
        <h3 style="color:#d4af37; margin-bottom:10px;">Adicionar Serviço</h3>
        <div class="form-group">
            <label>Nome</label>
            <input type="text" id="newServiceName" placeholder="Ex: Netflix">
        </div>
        <div class="form-group">
            <label>Emoji</label>
            <input type="text" id="newServiceEmoji" placeholder="📺" maxlength="2">
        </div>
        <button class="btn" onclick="addServiceFromForm()">Adicionar</button>
    </div>
    <div class="status-bar" id="statusBar"></div>
    <div class="services-grid" id="servicesGrid"></div>
</div>

<div id="compras" class="tab-content">
    <button class="btn btn-delete" onclick="clearAllPurchases()" style="margin-bottom:10px;">Limpar Todas as Compras</button>
    <div class="purchases-list" id="purchasesList"></div>
</div>

<div id="videos" class="tab-content">
    <div class="add-service-section">
        <h3 style="color:#d4af37; margin-bottom:10px;">Adicionar Vídeo</h3>
        <div class="form-group">
            <label>Título</label>
            <input type="text" id="videoTitle">
        </div>
        <div class="form-group">
            <label>Categoria</label>
            <input type="text" id="videoCategory" placeholder="Ex: Amador">
        </div>
        <div class="form-group">
            <label>URL (embed/link)</label>
            <input type="text" id="videoUrl" placeholder="https://...">
        </div>
        <button class="btn" onclick="addVideo()">Adicionar</button>
    </div>
    <div id="videosList"></div>
</div>

<div id="seguranca" class="tab-content">
  <div style="display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;">
    <button id="btnToggleBlock" class="btn" onclick="toggleBlockAdmin()" style="max-width:250px;">🔒 Bloquear Admin</button>
  </div>
  <h3 style="color:#d4af37; margin-bottom:10px;">📱 Dispositivos Autorizados</h3>
  <div id="allowedDevicesList" style="margin-bottom:30px;"></div>
  <h3 style="color:#d4af37; margin-bottom:10px;">⏳ Solicitações Pendentes</h3>
  <div id="pendingDevicesList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://pyzgoqmfmlmuhwmaoaou.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5emdvcW1mbWxtdWh3bWFvYW91Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgwOTU3MTYsImV4cCI6MjA4MzY3MTcxNn0.FQfJyo-zxFsAO8wQw6BMTMHL6hOFK4KrbaAebj0p6hU";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function switchTab(tab) {
  document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
  document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add("active");
  if (tab === 'contas') loadServicesAndRenderCards();
  if (tab === 'compras') renderPurchases();
  if (tab === 'videos') renderVideos();
  if (tab === 'seguranca') loadSecurityTab();
}

// ========== COMPRAS ==========
async function renderPurchases() {
    const container = document.getElementById("purchasesList");
    const { data: purchases, error } = await supabaseClient
        .from("purchases")
        .select("*")
        .order("created_at", { ascending: false });
    if (error) { container.innerHTML = '<p>Erro ao carregar.</p>'; return; }
    const pendingCount = purchases.filter(p => p.status === "pending").length;
    document.getElementById("pendingAlert").style.display = pendingCount ? "block" : "none";
    document.getElementById("pendingAlert").textContent = pendingCount ? `⚠ ${pendingCount} compra(s) pendente(s)` : "";
    if (!purchases.length) { container.innerHTML = '<p>Nenhuma compra.</p>'; return; }
    container.innerHTML = purchases.map(p => {
        const expiracao = p.expiry_date ? new Date(p.expiry_date).toLocaleString("pt-BR") : "—";
        const botoes = [];
        if (p.status === "pending") {
            botoes.push(`<button class="btn" onclick="approvePurchase('${p.id}')">Aprovar</button>`);
            botoes.push(`<button class="btn btn-delete" onclick="rejectPurchase('${p.id}')">Rejeitar</button>`);
        } else if (p.status === "approved") {
            botoes.push(`<button class="btn btn-renew" onclick="renewPurchase('${p.id}')">Renovar</button>`);
            botoes.push(`<button class="btn btn-expire" onclick="simulateExpiry('${p.id}')">Simular Vencimento</button>`);
            botoes.push(`<button class="btn btn-delete" onclick="deletePurchase('${p.id}')">Excluir</button>`);
        }
        return `<div class="purchase-card">
            <div><strong>${p.plan_name}</strong> - ${p.plan_price || ""}</div>
            <div>Cliente: ${p.payer_name || "—"}</div>
            <div>Email: ${p.client_email || "—"} | WhatsApp: ${p.client_whatsapp || "—"}</div>
            <div>Status: <span style="color:${p.status==='approved'?'#4caf50':p.status==='pending'?'#ffb300':'#ff4444'}">${p.status.toUpperCase()}</span></div>
            <div>PIN: ${p.pin || "—"} | Expira: ${expiracao}</div>
            <div class="btn-group" style="margin-top:8px;">${botoes.join("")}</div>
        </div>`;
    }).join("");
}

async function approvePurchase(id) {
    const { data: purchase } = await supabaseClient.from("purchases").select("*").eq("id", id).single();
    if (!purchase) return;
    const pin = String(Math.floor(Math.random() * 1000000)).padStart(6, "0");
    const isVitalicio = purchase.plan_name === "Vitalício";
    const days = { "1 Mês":30, "3 Meses":90, "6 Meses":180, "1 Ano":365 }[purchase.plan_name];
    const expiry = isVitalicio ? null : new Date(Date.now() + days * 86400000).toISOString();
    const { error } = await supabaseClient.from("purchases").update({
        pin, status: "approved", purchase_date: new Date().toISOString(), expiry_date: expiry
    }).eq("id", id);
    if (!error) { renderPurchases(); alert(`Aprovado! PIN: ${pin}`); }
}
async function rejectPurchase(id) {
    await supabaseClient.from("purchases").update({ status: "rejected" }).eq("id", id);
    renderPurchases();
}
async function deletePurchase(id) {
    if (confirm("Excluir permanentemente esta compra?")) {
        await supabaseClient.from("purchases").delete().eq("id", id);
        renderPurchases();
    }
}
async function renewPurchase(id) {
    const { data: purchase } = await supabaseClient.from("purchases").select("*").eq("id", id).single();
    if (!purchase || purchase.plan_name === "Vitalício") {
        alert("Plano vitalício não precisa de renovação.");
        return;
    }
    const days = { "1 Mês":30, "3 Meses":90, "6 Meses":180, "1 Ano":365 }[purchase.plan_name] || 30;
    const newExpiry = new Date(Date.now() + days * 86400000).toISOString();
    const { error } = await supabaseClient.from("purchases").update({ expiry_date: newExpiry }).eq("id", id);
    if (!error) { renderPurchases(); alert("Vencimento renovado com sucesso!"); }
}
async function simulateExpiry(id) {
    const { data: purchase } = await supabaseClient.from("purchases").select("*").eq("id", id).single();
    if (!purchase) return;
    if (purchase.plan_name === "Vitalício") {
        alert("Planos vitalícios não expiram.");
        return;
    }
    if (!confirm("Simular vencimento? O cliente será deslogado se estiver online.")) return;
    const pastDate = new Date(Date.now() - 60000).toISOString(); // 1 minuto atrás
    const { error } = await supabaseClient.from("purchases").update({ expiry_date: pastDate }).eq("id", id);
    if (!error) {
        renderPurchases();
        alert("Vencimento simulado! O cliente não conseguirá mais acessar com este PIN.");
    }
}
async function clearAllPurchases() {
    if (confirm("Apagar TODAS as compras?")) {
        await supabaseClient.from("purchases").delete().neq("id", "00000000-0000-0000-0000-000000000000");
        renderPurchases();
    }
}

// ========== SERVIÇOS E CONTAS ==========
async function loadAccountsForService(serviceId) {
    const { data } = await supabaseClient
        .from("accounts")
        .select("*")
        .eq("service_id", serviceId)
        .order("created_at", { ascending: false });
    return data || [];
}

async function loadServicesAndRenderCards() {
    const grid = document.getElementById("servicesGrid");
    const statusBar = document.getElementById("statusBar");
    const { data: services, error } = await supabaseClient
        .from("services")
        .select("*")
        .order("created_at", { ascending: false });
    if (error) { grid.innerHTML = '<p>Erro ao carregar.</p>'; return; }
    if (!services.length) { grid.innerHTML = '<p>Nenhum serviço.</p>'; statusBar.innerHTML = ''; return; }

    const allAccounts = [];
    for (const s of services) {
        s._accounts = await loadAccountsForService(s.id);
        allAccounts.push(...s._accounts);
    }
    const activeServices = services.filter(s => s._accounts.length > 0).length;
    const { data: purchases } = await supabaseClient.from("purchases").select("id, status");
    const activePurchases = purchases.filter(p => p.status === "approved").length;
    statusBar.innerHTML = `
        <div class="status-card"><h3>Contas</h3><div class="number">${allAccounts.length}</div></div>
        <div class="status-card"><h3>Serviços</h3><div class="number">${activeServices}</div></div>
        <div class="status-card"><h3>Ativas</h3><div class="number">${activePurchases}</div></div>`;

    grid.innerHTML = "";
    services.forEach(s => {
        const card = document.createElement("div");
        card.className = "service-card";
        card.setAttribute("data-service-id", s.id);
        const accountsText = s._accounts.map(a => `${a.username}:${a.password}`).join("\n");
        card.innerHTML = `
            <div class="service-header">
                <span class="service-emoji">${s.emoji || "📦"}</span>
                <span class="service-name">${s.name}</span>
                <span class="service-count">${s._accounts.length}</span>
            </div>
            <textarea class="accounts-input">${accountsText}</textarea>
            <div class="btn-group">
                <button class="btn" onclick="saveAccountsForService('${s.id}')">Salvar</button>
                <button class="btn btn-delete" onclick="deleteService('${s.id}')">Deletar</button>
            </div>
        `;
        grid.appendChild(card);
    });
}

async function saveAccountsForService(serviceId) {
    const card = document.querySelector(`[data-service-id="${serviceId}"]`);
    const textarea = card.querySelector(".accounts-input");
    const countSpan = card.querySelector(".service-count");
    const { data: serviceRow } = await supabaseClient.from("services").select("name, emoji").eq("id", serviceId).maybeSingle();
    const serviceName = serviceRow?.name || "Sem nome";
    const emoji = serviceRow?.emoji || "📦";

    const rawLines = textarea.value.split("\n").map(l => l.trim()).filter(l => l.length > 0);
    const newAccounts = [];

    for (const line of rawLines) {
        let username = "";
        let password = line;
        if (/^(https?:\/\/|www\.)/i.test(line)) {
            username = "";
            password = line;
        } else if (line.includes(":")) {
            const parts = line.split(":");
            username = parts[0].trim();
            password = parts.slice(1).join(":").trim();
        }
        password = password.replace(/\s+/g, "");
        if (/^www\./i.test(password)) password = "https://" + password;
        if (password.length > 0) {
            newAccounts.push({
                service_id: serviceId,
                service_name: serviceName,
                emoji,
                username: username,
                password: password
            });
        }
    }

    await supabaseClient.from("accounts").delete().eq("service_id", serviceId);
    if (newAccounts.length) await supabaseClient.from("accounts").insert(newAccounts);
    countSpan.textContent = newAccounts.length;
    alert(`${newAccounts.length} contas salvas.`);
}

async function deleteService(serviceId) {
    if (!confirm("Deletar serviço e suas contas?")) return;
    await supabaseClient.from("accounts").delete().eq("service_id", serviceId);
    await supabaseClient.from("services").delete().eq("id", serviceId);
    loadServicesAndRenderCards();
}

async function addServiceFromForm() {
    const name = document.getElementById("newServiceName").value.trim();
    const emoji = document.getElementById("newServiceEmoji").value.trim() || "📦";
    if (!name) return alert("Informe o nome.");
    const { error } = await supabaseClient.from("services").insert({ name, emoji });
    if (!error) {
        document.getElementById("newServiceName").value = "";
        document.getElementById("newServiceEmoji").value = "";
        loadServicesAndRenderCards();
    } else alert("Erro ao adicionar.");
}

// ========== VÍDEOS ==========
async function renderVideos() {
    const container = document.getElementById("videosList");
    const { data: videos, error } = await supabaseClient
        .from("videos")
        .select("*")
        .order("created_at", { ascending: false });
    if (error) { container.innerHTML = '<p>Erro.</p>'; return; }
    if (!videos.length) { container.innerHTML = '<p>Nenhum vídeo.</p>'; return; }
    container.innerHTML = videos.map(v => `
        <div class="video-admin-card">
            <strong>${v.title}</strong> (${v.category || 'Sem cat'})<br>
            <small style="color:#00d4ff;">${v.url}</small>
            <button class="btn btn-delete" onclick="deleteVideo('${v.id}')">Deletar</button>
        </div>
    `).join("");
}

async function addVideo() {
    const title = document.getElementById("videoTitle").value.trim();
    const category = document.getElementById("videoCategory").value.trim();
    const url = document.getElementById("videoUrl").value.trim();
    if (!title || !url) return alert("Preencha título e URL.");
    const { error } = await supabaseClient.from("videos").insert({ title, category, url });
    if (!error) {
        document.getElementById("videoTitle").value = "";
        document.getElementById("videoCategory").value = "";
        document.getElementById("videoUrl").value = "";
        renderVideos();
    }
}

async function deleteVideo(id) {
    if (confirm("Deletar vídeo?")) {
        await supabaseClient.from("videos").delete().eq("id", id);
        renderVideos();
    }
}

async function init() {
    renderPurchases();
    loadServicesAndRenderCards();
    renderVideos();
}

// ========== SEGURANÇA ==========
async function loadSecurityTab() {
  const { data: config } = await supabaseClient.from("admin_config").select("*").eq("id", 1).maybeSingle();
  if (!config) return;

  const isBlocked = config.is_blocked;
  const allowed = config.allowed_devices || [];

  document.getElementById("btnToggleBlock").textContent = isBlocked ? "🔓 Desbloquear Admin" : "🔒 Bloquear Admin";
  document.getElementById("btnToggleBlock").style.background = isBlocked ? "#ffb300" : "#d4af37";

  // Lista de autorizados
  const allowedHtml = allowed.length
    ? allowed.map(d => `<div class="purchase-card" style="margin-bottom:8px;">
        <span>🟢 ${d}</span>
        <button class="btn btn-delete" onclick="removeDevice('${d}')" style="margin-left:10px;">Remover</button>
      </div>`).join("")
    : "<p>Nenhum dispositivo autorizado ainda.</p>";
  document.getElementById("allowedDevicesList").innerHTML = allowedHtml;

  // Solicitações pendentes
  const { data: requests } = await supabaseClient
    .from("device_requests")
    .select("*")
    .eq("status", "pending")
    .order("requested_at", { ascending: false });

  const pendingHtml = requests && requests.length
    ? requests.map(r => `<div class="purchase-card" style="margin-bottom:8px;">
        <span>🟡 ${r.device_id}</span>
        <span style="font-size:0.8em;color:#888;"> (${new Date(r.requested_at).toLocaleString()})</span>
        <div style="margin-top:5px;">
          <button class="btn btn-renew" onclick="approveDevice('${r.id}', '${r.device_id}')">Aprovar</button>
          <button class="btn btn-delete" onclick="rejectDevice('${r.id}')">Rejeitar</button>
        </div>
      </div>`).join("")
    : "<p>Nenhuma solicitação pendente.</p>";
  document.getElementById("pendingDevicesList").innerHTML = pendingHtml;
}

async function toggleBlockAdmin() {
  const { data: config } = await supabaseClient.from("admin_config").select("*").eq("id", 1).maybeSingle();
  if (!config) return;
  const newBlocked = !config.is_blocked;
  const { error } = await supabaseClient.from("admin_config").update({ is_blocked: newBlocked }).eq("id", 1);
  if (!error) loadSecurityTab();
}

async function approveDevice(requestId, deviceId) {
  // Adiciona device à lista de autorizados
  const { data: config } = await supabaseClient.from("admin_config").select("*").eq("id", 1).maybeSingle();
  if (!config) return;
  const allowed = config.allowed_devices || [];
  if (!allowed.includes(deviceId)) {
    allowed.push(deviceId);
    await supabaseClient.from("admin_config").update({ allowed_devices: allowed }).eq("id", 1);
  }
  // Atualiza status da solicitação
  await supabaseClient.from("device_requests").update({ status: "approved" }).eq("id", requestId);
  loadSecurityTab();
}

async function rejectDevice(requestId) {
  await supabaseClient.from("device_requests").update({ status: "rejected" }).eq("id", requestId);
  loadSecurityTab();
}

async function removeDevice(deviceId) {
  const { data: config } = await supabaseClient.from("admin_config").select("*").eq("id", 1).maybeSingle();
  if (!config) return;
  const allowed = config.allowed_devices || [];
  const updated = allowed.filter(d => d !== deviceId);
  await supabaseClient.from("admin_config").update({ allowed_devices: updated }).eq("id", 1);
  loadSecurityTab();
}

window.addEventListener("load", init);
</script>
</body>
</html>
