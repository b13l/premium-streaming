    const depoimentos = [];
    let lastNome = null;
    for (let i = 0; i < 15; i++) {
        const nome = getRandomName(lastNome);
        const plan = getRandomPlan();
        depoimentos.push({ nome, plan: plan.name, time: getRandomTimeAgo(), text: getRandomMessage() });
        lastNome = nome;
    }

    let index = 0;
    function show() {
        const d = depoimentos[index];
        nameEl.textContent = d.nome;
        planEl.textContent = d.plan;
        textEl.textContent = d.text;
        timeEl.textContent = d.time;
        index = (index + 1) % depoimentos.length;
    }
    show();
    if (testimonialInterval) clearInterval(testimonialInterval);
    testimonialInterval = setInterval(show, 4000);
}

// ---------- MODAL DE CONTAS COM BLUR E REVELAR TODAS ----------
async function openAccountsModal(serviceId) {
    const { data: accounts } = await supabaseClient
        .from("accounts")
        .select("*")
        .eq("service_id", serviceId)
        .order("created_at", { ascending: false });

    const { data: service } = await supabaseClient
        .from("services")
        .select("name")
        .eq("id", serviceId)
        .maybeSingle();

    const serviceName = service?.name || "Serviço";
    document.getElementById("accountsModalTitle").textContent = `🔐 ${serviceName}`;

    let html = "";
    if (accounts && accounts.length > 0) {
        html = accounts.map(acc => {
            let pwd = acc.password.replace(/\s+/g, "");
            pwd = pwd.replace(/^(https?):?\/\//, (match, protocol) => protocol + "://");
            if (pwd.startsWith("//")) pwd = "https:" + pwd;
            if (/^www\./i.test(pwd)) pwd = "https://" + pwd;

            const isUrl = pwd.startsWith("http://") || pwd.startsWith("https://");
            const pwDisplay = isUrl
                ? `<a href="${pwd}" target="_blank" style="color:#00aaff; text-decoration:underline;">${pwd}</a>`
                : pwd;
            const creds = acc.username ? `${acc.username}:${pwd}` : pwd;

            const buttonHtml = isUrl
                ? `<button class="access-account-btn" onclick="event.stopPropagation(); window.open('${pwd}', '_blank')">🔗 Acessar</button>`
                : `<button class="copy-account-btn" onclick="event.stopPropagation(); copyCreds('${creds.replace(/'/g, "\\'")}')">📋 Copiar</button>`;

            const userDisplay = acc.username ? `<strong>${acc.username}</strong><br>` : "";

            // Adiciona classe 'blurred' por padrão
            return `<div class="account-line blurred">
                ${userDisplay}${pwDisplay}
                ${buttonHtml}
            </div>`;
        }).join("");
    } else {
        html = '<p style="color:#888;text-align:center;padding:20px;">Nenhuma conta disponível.</p>';
    }

    document.getElementById("accountsModalBody").innerHTML = html;
    document.getElementById("accountsModal").classList.add("active");
    document.body.style.overflow = "hidden";

    // Resetar visibilidade do botão revelar
    const revealBtn = document.getElementById("revealAllBtn");
    if (revealBtn) {
        revealBtn.style.display = "block";
        revealBtn.disabled = false;
    }
}

function revealAllAccounts() {
    const blurredLines = document.querySelectorAll("#accountsModalBody .account-line.blurred");
    blurredLines.forEach(line => {
        line.classList.remove("blurred");
        line.style.filter = "none"; // Força a remoção
    });
    const revealBtn = document.getElementById("revealAllBtn");
    if (revealBtn) {
        revealBtn.style.display = "none";
        // Pequeno efeito visual ao sumir
        revealBtn.style.transition = "0.3s";
        revealBtn.style.opacity = "0";
    }
}

function copyCreds(text) {
    navigator.clipboard.writeText(text).then(() => alert("Credenciais copiadas!"));
}

function closeAccountsModal() {
    document.getElementById("accountsModal").classList.remove("active");
    document.body.style.overflow = "";
}

// ---------- RENDERIZAÇÃO PRINCIPAL ----------
async function renderProducts(purchaseFromPin = null) {
    const grid = document.getElementById("productsGrid");
    grid.innerHTML = "";
    grid.className = (currentMode === "videos") ? "videos-grid" : "products-grid";

    if (currentMode === "new") {
        const { data: services } = await supabaseClient.from("services").select("name, emoji").order("created_at", { ascending: false });
        const serviceList = services || [];
        const benefitItems = serviceList.map(s => `<div class="benefit-item">${s.emoji||"📺"} ${s.name}</div>`).join("");

        plans.forEach(plan => {
            const card = document.createElement("div");
            card.className = "product-card" + (plan.name === "6 Meses" ? " best-offer" : "");
            card.innerHTML = `
                ${plan.name === "6 Meses" ? '<div class="best-offer-badge">MELHOR OFERTA</div>' : ''}
                <div class="product-header">
                    <div class="product-logo">${plan.logo}</div>
                    <h2 class="product-name">${plan.name}</h2>
                    <div class="product-price">${plan.price}</div>
                    <div class="product-price-label">${plan.duration === -1 ? "Para Sempre" : `${plan.duration} meses`}</div>
                </div>
                <div class="benefits-list">${benefitItems || '<div style="color:#aaffcc;">Serviços em breve</div>'}</div>
                <button class="btn btn-buy" onclick="buyPlan(${plan.id})">Comprar Agora</button>
            `;
            grid.appendChild(card);
        });
        return;
    }

    if (currentMode === "existing" && isLoggedIn) {
        const { data: services } = await supabaseClient.from("services").select("*").order("created_at", { ascending: false });
        if (!services?.length) {
            grid.innerHTML = '<p style="color:#ccc;text-align:center;padding:30px;">Nenhum serviço disponível.</p>';
            return;
        }

        let userPurchase = null;
        if (loggedInPin !== ADMIN_PIN) {
            userPurchase = purchaseFromPin || (await supabaseClient.from("purchases").select("*").eq("pin", loggedInPin).eq("status", "approved").maybeSingle()).data;
            // Verificar expiração (exceto Vitalício)
            if (userPurchase && userPurchase.plan_name !== "Vitalício" && userPurchase.expiry_date && new Date(userPurchase.expiry_date) < new Date()) {
                alert("Sua conta expirou! Entre em contato para renovar.");
                logout();
                return;
            }
        }

        if (loggedInPin !== ADMIN_PIN && userPurchase) {
            const expirou = userPurchase.expiry_date ? new Date(userPurchase.expiry_date).toLocaleString("pt-BR") : "—";
            const expiracaoTexto = userPurchase.plan_name === "Vitalício" ? "Vitalício (sem expiração)" : expirou;
            const infoDiv = document.createElement("div");
            infoDiv.style = "text-align:center;margin-bottom:20px;grid-column:1/-1;";
            infoDiv.innerHTML = `<div style="background:rgba(76,175,80,0.1);border:2px solid #4caf50;color:#81c784;padding:12px;border-radius:8px;"><strong>✅ Acesso Ativo</strong><br>Plano: ${userPurchase.plan_name}<br>Expira em: ${expiracaoTexto}</div>`;
            grid.appendChild(infoDiv);
        }

        const titleDiv = document.createElement("div");
        titleDiv.innerHTML = '<h2 style="grid-column:1/-1;text-align:center;color:#cc44ff;margin-bottom:15px;">Todas as Contas Disponíveis</h2>';
        grid.appendChild(titleDiv);

        services.forEach(svc => {
            const card = document.createElement("div");
            card.className = "product-card";
            card.style.textAlign = "center";
            card.innerHTML = `
                <div class="product-header">
                    <span class="product-logo">${svc.emoji||"📺"}</span>
                    <h2 class="product-name">${svc.name}</h2>
                </div>
                <button class="btn btn-show-accounts" onclick="openAccountsModal('${svc.id}')">Mostrar Contas</button>
            `;
            grid.appendChild(card);
        });
        return;
    }

    // VÍDEOS +18
    if (currentMode === "videos" && isLoggedIn) {
        const { data: videos } = await supabaseClient.from("videos").select("*").order("created_at", { ascending: false });
        if (!videos || videos.length === 0) {
            grid.innerHTML = '<p style="color:#888;text-align:center;padding:30px;">Nenhum vídeo disponível.</p>';
            return;
        }

        grid.className = "videos-grid";
        const titleDiv = document.createElement("div");
        titleDiv.style.gridColumn = "1 / -1";
        titleDiv.style.textAlign = "center";
        titleDiv.style.marginBottom = "10px";
        titleDiv.innerHTML = '<h2 style="color:#ff2244; font-size:1.6em;">🎥 Vídeos +18 Em Alta🔥🔥</h2>';
        grid.appendChild(titleDiv);

        videos.forEach(v => {
            const card = document.createElement("div");
            card.className = "video-thumb-card";
            let embedUrl = v.url;
            if (v.url.includes("youtube.com/watch?v=")) {
                const vid = v.url.split("v=")[1]?.split("&")[0];
                if (vid) embedUrl = `https://www.youtube.com/embed/${vid}`;
            } else if (v.url.includes("youtu.be/")) {
                const vid = v.url.split("youtu.be/")[1]?.split("?")[0];
                if (vid) embedUrl = `https://www.youtube.com/embed/${vid}`;
            }
            card.innerHTML = `
                <div class="video-thumb-poster">
                    <iframe src="${embedUrl}" loading="lazy" allowfullscreen></iframe>
                    <div class="play-icon">▶</div>
                </div>
                <div class="video-thumb-info">
                    <div class="video-thumb-title">${v.title}</div>
                    <div class="video-thumb-category">📂 ${v.category || 'Sem categoria'}</div>
                </div>`;
            card.addEventListener("click", () => openVideoModal(v.url, v.title));
            grid.appendChild(card);
        });
        return;
    }

    grid.className = "products-grid";
}

// ---------- VÍDEO MODAL ----------
function openVideoModal(url, title) {
    let embedUrl = url;
    if (url.includes("youtube.com/watch?v=")) {
        const vid = url.split("v=")[1]?.split("&")[0];
        if (vid) embedUrl = `https://www.youtube.com/embed/${vid}?autoplay=1`;
    } else if (url.includes("youtu.be/")) {
        const vid = url.split("youtu.be/")[1]?.split("?")[0];
        if (vid) embedUrl = `https://www.youtube.com/embed/${vid}?autoplay=1`;
    }
    document.getElementById("videoModalTitle").textContent = title || "Vídeo";
    document.getElementById("videoModalFrame").src = embedUrl;
    document.getElementById("videoModal").classList.add("active");
    document.body.style.overflow = "hidden";
}
function closeVideoModal() {
    document.getElementById("videoModal").classList.remove("active");
    document.getElementById("videoModalFrame").src = "";
    document.body.style.overflow = "";
}
function handleVideoModalClick(e) {
    if (e.target === document.getElementById("videoModal")) closeVideoModal();
}

// ---------- AUTENTICAÇÃO ----------
async function validatePin() {
    const pin = document.getElementById("pinInput").value.trim();
    if (pin.length !== 6) { alert("PIN inválido!"); return; }
    if (pin === ADMIN_PIN) {
        isLoggedIn = true; loggedInPin = pin;
        document.getElementById("pinModal").classList.remove("active");
        document.getElementById("loggedInInfo").style.display = "block";
        document.getElementById("btnVideos").style.display = "inline-block";
        document.getElementById("chatPanel").classList.add("hidden");
        document.getElementById("feedbacksSection").style.display = "none";
        renderProducts(); return;
    }
    const { data: purchase } = await supabaseClient.from("purchases").select("*").eq("pin", pin).eq("status", "approved").maybeSingle();
    if (!purchase) { alert("PIN incorreto ou não aprovado!"); return; }
    // Verificar expiração (exceto Vitalício)
    if (purchase.plan_name !== "Vitalício" && purchase.expiry_date && new Date(purchase.expiry_date) < new Date()) {
        alert("Este PIN expirou. Entre em contato para renovar.");
        return;
    }
    isLoggedIn = true; loggedInPin = pin;
    document.getElementById("pinModal").classList.remove("active");
    document.getElementById("loggedInInfo").style.display = "block";
    document.getElementById("btnVideos").style.display = "inline-block";
    document.getElementById("chatPanel").classList.add("hidden");
    document.getElementById("feedbacksSection").style.display = "none";
    renderProducts(purchase);
}
function closePinModal() { document.getElementById("pinModal").classList.remove("active"); switchMode("new"); }
function logout() {
    isLoggedIn = false; loggedInPin = null;
    currentMode = "new";
    document.getElementById("loggedInInfo").style.display = "none";
    document.getElementById("btnVideos").style.display = "none";
    document.getElementById("btnNewCustomer").classList.add("active");
    document.getElementById("btnExistingCustomer").classList.remove("active");
    document.getElementById("btnVideos").classList.remove("active");
    document.getElementById("chatPanel").classList.remove("hidden");
    document.getElementById("feedbacksSection").style.display = "block";
    renderProducts();
}
function switchMode(mode) {
    if (mode === "videos") {
        const pass = prompt("🔐 Senha de segurança para +18:");
        if (pass !== "#+18xxx") { alert("Senha incorreta!"); return; }
    }
    currentMode = mode;
    document.getElementById("btnNewCustomer").classList.toggle("active", mode==="new");
    document.getElementById("btnExistingCustomer").classList.toggle("active", mode==="existing");
    document.getElementById("btnVideos").classList.toggle("active", mode==="videos");
    document.getElementById("chatPanel").classList.toggle("hidden", isLoggedIn || mode!=="new");
    document.getElementById("feedbacksSection").style.display = (isLoggedIn || mode!=="new") ? "none" : "block";
    if (mode === "existing" && !isLoggedIn) { document.getElementById("pinModal").classList.add("active"); return; }
    renderProducts();
}

// ---------- COMPRA ----------
function buyPlan(planId) {
    selectedPlan = plans.find(p => p.id === planId);
    document.getElementById("planInfo").textContent = `${selectedPlan.name} - ${selectedPlan.price}`;
    document.getElementById("pixModal").classList.add("active");
}
function closePix() { document.getElementById("pixModal").classList.remove("active"); }
async function confirmPayment() {
    if (!proofFileData) return document.getElementById("pixErrorContainer").innerHTML = '<div style="color:#f44;">Anexe o comprovante!</div>';
    const payerName = document.getElementById("payerFullName").value.trim();
    if (!payerName) return document.getElementById("pixErrorContainer").innerHTML = '<div style="color:#f44;">Informe o nome do pagador.</div>';
    const { error } = await supabaseClient.from("purchases").insert({
        plan_name: selectedPlan.name, plan_price: selectedPlan.price,
        payer_name: payerName,
        client_email: document.getElementById("clientEmail").value.trim() || null,
        client_whatsapp: document.getElementById("clientWhatsapp").value.trim() || null,
        status: "pending", proof_data: proofFileData.data || null,
        purchase_date: new Date().toISOString()
    });
    if (error) { alert("Erro ao enviar."); return; }
    document.getElementById("pendingMessage").innerHTML = '<div style="color:#4caf50;">Comprovante enviado! Aguarde aprovação.<br><button onclick="window.open(\'https://wa.me/message/PWMMI3VQ4LGLP1\',\'_blank\')" style="background:#25d366;color:#fff;border:none;padding:8px;border-radius:5px;margin-top:8px;">Chamar no WhatsApp</button></div>';
}
function validateAndPreviewProof() {
    const file = document.getElementById("proofFile").files[0];
    if (!file) return;
    if (!file.type.startsWith("image/") && file.type !== "application/pdf") return document.getElementById("pixErrorContainer").innerHTML = '<div style="color:#f44;">Formato inválido!</div>';
    const reader = new FileReader();
    reader.onload = e => {
        proofFileData = { name: file.name, data: e.target.result };
        if (file.type.startsWith("image/")) {
            document.getElementById("proofImage").src = e.target.result;
            document.getElementById("proofPreview").style.display = "block";
        } else document.getElementById("proofPreview").style.display = "none";
    };
    reader.readAsDataURL(file);
}
function copyPix() { navigator.clipboard.writeText(PIX_EMAIL); alert("PIX copiado!"); }
function showAutoAnswer(q) {
    document.getElementById("chatMessages").innerHTML = `<div style="background:#00ff88;color:#0a0a0a;padding:10px;border-radius:8px;">${autoAnswers[q]}</div>`;
}

async function init() {
    startTestimonials();
    startNotificationSpam();
    renderProducts();
}
window.addEventListener("load", init);
</script>
